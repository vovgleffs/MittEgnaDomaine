<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Välkommen...</title>
    <style>
        body {
            margin: 0;
            background: black;
            color: red;
            font-family: "Courier New", monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            animation: flicker 2s infinite;
        }

        h1 {
            font-size: 3rem;
            text-shadow: 0 0 10px red, 0 0 20px darkred;
        }

        p {
            font-size: 1.2rem;
            opacity: 0.8;
        }

        button {
            margin-top: 30px;
            padding: 15px 30px;
            background: transparent;
            border: 2px solid red;
            color: red;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: red;
            color: black;
            box-shadow: 0 0 20px red;
        }

        @keyframes flicker {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        /* glitch effekt */
        .glitch {
            position: relative;
            color: red;
        }

        .glitch::before,
        .glitch::after {
            content: attr(data-text);
            position: absolute;
            left: 0;
        }

        .glitch::before {
            animation: glitchTop 1s infinite;
            color: #ff0000;
            clip-path: inset(0 0 50% 0);
        }

        .glitch::after {
            animation: glitchBottom 1s infinite;
            color: #990000;
            clip-path: inset(50% 0 0 0);
        }

        @keyframes glitchTop {
            0% { transform: translate(0); }
            50% { transform: translate(-2px, -2px); }
            100% { transform: translate(0); }
        }

        @keyframes glitchBottom {
            0% { transform: translate(0); }
            50% { transform: translate(2px, 2px); }
            100% { transform: translate(0); }
        }

    </style>
</head>
<body>

<div class="container">
    <h1 class="glitch" data-text="DU BORDE INTE VARA HÄR">
        DU BORDE INTE VARA HÄR
    </h1>

    <p>...men nu när du är här finns ingen återvändo</p>

    <button onclick="enterSite()">GÅ VIDARE</button>
</div>

<script>
    function enterSite() {
        window.location.href = "Startsida/startsida.html";
    }

    // slumpmässigt blinkande titel
    setInterval(() => {
        document.title = Math.random() > 0.5 ? "..." : "VÄND OM";
    }, 1000);
</script>

</body>
</html>
